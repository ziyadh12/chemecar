<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chem-E-Car Distance Calculator</title>
  <style>
    :root {
      --bg: #f6f7f2;
      --panel: #ffffff;
      --ink: #1f2623;
      --muted: #64706b;
      --line: #d9ded8;
      --accent: #18756d;
      --accent-strong: #0e514b;
      --warm: #c95d2e;
      --shadow: 0 18px 50px rgba(24, 38, 34, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(24, 117, 109, 0.12), transparent 34%),
        linear-gradient(315deg, rgba(201, 93, 46, 0.10), transparent 30%),
        var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 30px 0;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 22px;
      align-items: start;
    }

    .workspace,
    .results,
    .advanced-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .workspace {
      overflow: hidden;
    }

    header {
      padding: 24px 24px 18px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 3vw, 3rem);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.45;
      max-width: 62ch;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border-bottom: 1px solid var(--line);
      background: #eef3f0;
    }

    .mode-tabs {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      border-top: 1px solid var(--line);
    }

    .tab {
      min-height: 48px;
      border: 0;
      border-right: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      font: 700 0.9rem/1.1 Arial, Helvetica, sans-serif;
      cursor: pointer;
    }

    .tab:last-child {
      border-right: 0;
    }

    .tab.active {
      background: var(--panel);
      color: var(--accent-strong);
      box-shadow: inset 0 3px 0 var(--accent);
    }

    .tab-panel {
      display: none;
      padding: 22px 24px 10px;
    }

    .tab-panel.active {
      display: block;
    }

    .control-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    #chemical-controls {
      margin-top: 18px;
    }

    .control {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfa;
    }

    .control-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 12px;
    }

    label {
      font-weight: 700;
      color: var(--ink);
      overflow-wrap: anywhere;
    }

    output {
      min-width: 76px;
      color: var(--accent-strong);
      font-weight: 700;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--ink);
      font: 700 0.92rem/1 Arial, Helvetica, sans-serif;
      padding: 0 10px;
    }

    .bounds {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 6px;
      font-variant-numeric: tabular-nums;
    }

    .advanced-panel {
      margin: 18px 0 0;
      box-shadow: none;
    }

    details {
      padding: 0;
    }

    summary {
      min-height: 48px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      color: var(--accent-strong);
      font-weight: 800;
      cursor: pointer;
      list-style: none;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    summary::before {
      content: "+";
      display: grid;
      place-items: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      font-weight: 800;
      line-height: 1;
    }

    details[open] summary::before {
      content: "-";
    }

    .advanced-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      padding: 0 16px 16px;
    }

    .results {
      position: sticky;
      top: 18px;
      padding: 22px;
    }

    .distance-label {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .distance {
      margin: 8px 0 16px;
      font-size: clamp(1.55rem, 3.2vw, 2.35rem);
      line-height: 1;
      color: var(--accent-strong);
      font-weight: 900;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .metrics {
      display: grid;
      gap: 10px;
      margin: 0 0 16px;
    }

    .metric {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.94rem;
    }

    .metric strong {
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .graph-panel {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfa;
    }

    .graph-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
    }

    .graph-title {
      margin: 0;
      color: var(--ink);
      font-size: 0.92rem;
      font-weight: 800;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px 12px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .swatch {
      width: 18px;
      height: 3px;
      border-radius: 999px;
    }

    .swatch.position {
      background: var(--accent);
    }

    .swatch.velocity {
      background: var(--warm);
    }

    canvas {
      display: block;
      width: 100%;
      height: 220px;
    }

    .reset {
      width: 100%;
      min-height: 44px;
      margin-top: 18px;
      border: 1px solid var(--accent);
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font-weight: 800;
      cursor: pointer;
    }

    .reset:hover,
    .tab:hover {
      filter: brightness(0.96);
    }

    @media (max-width: 860px) {
      main {
        width: min(100% - 20px, 680px);
        padding: 10px 0;
      }

      .app {
        grid-template-columns: 1fr;
      }

      .results {
        position: static;
        order: -1;
      }
    }

    @media (max-width: 620px) {
      header,
      .tab-panel {
        padding-left: 16px;
        padding-right: 16px;
      }

      .tabs,
      .control-grid,
      .advanced-grid {
        grid-template-columns: 1fr;
      }

      .tab {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .advanced-panel {
        margin-left: 16px;
        margin-right: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="app">
      <section class="workspace" aria-label="Chem-E-Car model inputs">
        <header>
          <h1>Chem-E-Car Distance Calculator</h1>
          <p class="subtitle">Calculate distance using set design parameters.</p>
        </header>

        <nav class="tabs mode-tabs" aria-label="Reaction type">
          <button class="tab active" type="button" data-mode="battery">Battery Reaction</button>
          <button class="tab" type="button" data-mode="pressure">Pressure Reaction</button>
        </nav>

        <nav class="tabs" id="parameter-tabs" aria-label="Parameter groups">
          <button class="tab active" type="button" data-tab="motor" data-modes="battery">Motor</button>
          <button class="tab" type="button" data-tab="cart">Cart</button>
          <button class="tab" type="button" data-tab="chemical" data-modes="battery">Chemical Clock</button>
          <button class="tab" type="button" data-tab="pressure" data-modes="pressure" hidden>Pressure Reaction</button>
        </nav>

        <section class="tab-panel active" id="motor" aria-label="Motor parameters">
          <div class="control-grid">
            <div class="control" data-control="voltage"></div>
          </div>
          <div class="advanced-panel">
            <details>
              <summary>Advanced Settings</summary>
              <div class="advanced-grid">
                <div class="control" data-control="torque_constant"></div>
                <div class="control" data-control="w_max"></div>
                <div class="control" data-control="resistance"></div>
              </div>
            </details>
          </div>
        </section>

        <section class="tab-panel" id="cart" aria-label="Cart parameters">
          <div class="control-grid">
            <div class="control" data-control="mass"></div>
            <div class="control" data-control="wheel_mass"></div>
            <div class="control" data-control="number_wheels"></div>
            <div class="control" data-control="radius"></div>
          </div>
          <div class="advanced-panel">
            <details>
              <summary>Advanced Settings</summary>
              <div class="advanced-grid">
                <div class="control" data-control="bearing_friction"></div>
                <div class="control" data-control="rolling_friction"></div>
                <div class="control" data-control="g"></div>
              </div>
            </details>
          </div>
        </section>

        <section class="tab-panel" id="chemical" aria-label="Chemical clock parameters">
          <div class="control-grid">
            <div class="control">
              <div class="control-top">
                <label for="reaction-select">Chemical Reaction</label>
              </div>
              <select id="reaction-select"></select>
            </div>
          </div>
          <div class="control-grid" id="chemical-controls"></div>
        </section>

        <section class="tab-panel" id="pressure" aria-label="Pressure reaction parameters">
          <div class="control-grid">
            <div class="control">
              <div class="control-top">
                <label for="pressure-reaction-select">Pressure Reaction</label>
              </div>
              <select id="pressure-reaction-select"></select>
            </div>
            <div class="control" data-control="reaction_time"></div>
          </div>
          <div class="control-grid" id="pressure-controls"></div>
          <div class="advanced-panel">
            <details>
              <summary>Advanced Settings</summary>
              <div class="advanced-grid">
                <div class="control" data-control="pressure_w_no_load_default"></div>
                <div class="control" data-control="pressure_stall_torque_default"></div>
                <div class="control" data-control="default_pressure"></div>
              </div>
            </details>
          </div>
        </section>
      </section>

      <aside class="results" aria-label="Calculated output">
        <p class="distance-label">Distance</p>
        <div class="distance"><span id="distance">0.000</span> m</div>
        <div class="metrics">
          <div class="metric">
            <span>Clock time</span>
            <strong id="clock-time">0.000 s</strong>
          </div>
        </div>
        <div class="graph-panel">
          <div class="graph-head">
            <p class="graph-title">Motion Over Time</p>
            <div class="legend" aria-hidden="true">
              <span class="legend-item"><span class="swatch position"></span>Position</span>
              <span class="legend-item"><span class="swatch velocity"></span>Linear Velocity</span>
            </div>
          </div>
          <canvas id="motion-chart" width="560" height="320" aria-label="Position and linear velocity over time"></canvas>
        </div>
        <button class="reset" type="button" id="reset">Reset Defaults</button>
      </aside>
    </div>
  </main>

  <script>
    const parameterDefs = {
      voltage: { label: "Voltage", value: 1.5, min: 0.1, max: 12, step: 0.1, unit: "V" },
      resistance: { label: "Resistance", value: 0.0625, min: 0.01, max: 1, step: 0.0025, unit: "ohm" },
      torque_constant: { label: "Torque Constant", value: 0.0025, min: 0.0001, max: 0.02, step: 0.0001, unit: "N m/A" },
      w_max: { label: "No Load Angular Velocity", value: 500, min: 10, max: 500, step: 1, unit: "rad/s" },
      mass: { label: "Mass", value: 2.5, min: 0.1, max: 10, step: 0.1, unit: "kg" },
      wheel_mass: { label: "Wheel Mass", value: 0.05, min: 0.005, max: 0.5, step: 0.005, unit: "kg" },
      number_wheels: { label: "Number Of Wheels", value: 4, min: 1, max: 8, step: 1, unit: "" },
      radius: { label: "Wheel Radius", value: 0.025, min: 0.005, max: 0.15, step: 0.001, unit: "m" },
      reaction_time: { label: "Reaction Time", value: 10, min: 0.1, max: 60, step: 0.1, unit: "s" },
      volume: { label: "Volume", value: 0.025, min: 0.001, max: 0.1, step: 0.001, unit: "L" },
      pressure_w_no_load_default: { label: "Default No Load Angular Velocity", value: 157, min: 10, max: 500, step: 1, unit: "rad/s" },
      pressure_stall_torque_default: { label: "Default Stall Torque", value: 0.04, min: 0.001, max: 0.2, step: 0.001, unit: "N m" },
      default_pressure: { label: "Default Pressure", value: 20, min: 1, max: 100, step: 1, unit: "" },
      thiosulfate: { label: "Thiosulfate", value: 1, min: 0.1, max: 10, step: 0.1, unit: "" },
      hydrogen_peroxide: { label: "Hydrogen Peroxide", value: 4, min: 0.1, max: 10, step: 0.1, unit: "" },
      pressure_hydrogen_peroxide: { label: "Hydrogen Peroxide", value: 0.05, min: 0.001, max: 1, step: 0.001, unit: "" },
      iodine: { label: "Iodine", value: 1, min: 0.1, max: 10, step: 0.1, unit: "" },
      peroxodisulfate: { label: "Peroxodisulfate", value: 1, min: 0.1, max: 10, step: 0.1, unit: "" },
      ascorbicacid: { label: "Ascorbic Acid", value: 1, min: 0.1, max: 10, step: 0.1, unit: "" },
      bisulfate: { label: "Bisulfate", value: 1, min: 0.1, max: 10, step: 0.1, unit: "" },
      iodate: { label: "Iodate", value: 1, min: 0.1, max: 10, step: 0.1, unit: "" },
      sodium_bicarbonate: { label: "Sodium Bicarbonate", value: 0.05, min: 0.001, max: 1, step: 0.001, unit: "" },
      calcium_carbonate: { label: "Calcium Carbonate", value: 0.05, min: 0.001, max: 1, step: 0.001, unit: "" },
      zinc: { label: "Zinc", value: 0.05, min: 0.001, max: 1, step: 0.001, unit: "" },
      carbon_dioxide: { label: "Carbon Dioxide", value: 0.05, min: 0.001, max: 1, step: 0.001, unit: "" },
      bearing_friction: { label: "Bearing Friction", value: 0.15, min: 0, max: 1, step: 0.01, unit: "" },
      rolling_friction: { label: "Rolling Friction", value: 0.05, min: 0, max: 1, step: 0.01, unit: "" },
      g: { label: "G", value: 9.8, min: 1, max: 20, step: 0.1, unit: "m/s^2" }
    };

    const modelConstants = {
      k: 0.05,
      motorEfficiency: 0.95
    };

    const chemicalReactions = {
      time_stop_thiosulfate: {
        label: "Thiosulfate Clock",
        reactants: ["thiosulfate", "iodine", "hydrogen_peroxide"],
        calculate: (params) => params.thiosulfate / (0.024 * params.iodine * params.hydrogen_peroxide)
      },
      time_stop_peroxodisulfate: {
        label: "Peroxodisulfate Clock",
        reactants: ["thiosulfate", "iodine", "peroxodisulfate"],
        calculate: (params) => params.thiosulfate / (0.040 * params.iodine * params.peroxodisulfate)
      },
      time_stop_ascorbicacid: {
        label: "Ascorbicacid Clock",
        reactants: ["ascorbicacid", "iodine", "peroxodisulfate"],
        calculate: (params) => params.ascorbicacid / (0.025 * params.iodine * params.peroxodisulfate)
      },
      time_stop_landoltiodine: {
        label: "Landoltiodine Clock",
        reactants: ["bisulfate", "iodate"],
        calculate: (params) => 0.003 / (params.iodate * params.bisulfate)
      }
    };

    const pressureReactions = {
      pressure_release_hydrogen_peroxide: {
        label: "Hydrogen Peroxide Pressure",
        reactants: ["pressure_hydrogen_peroxide"],
        calculatePressure: (params) => 12.23 * params.pressure_hydrogen_peroxide / params.volume
      },
      pressure_release_sodium_bicarbonate_acetic_acid: {
        label: "Sodium Bicarbonate Acetic Acid Pressure",
        reactants: ["sodium_bicarbonate"],
        calculatePressure: (params) => 24.47 * params.sodium_bicarbonate / params.volume
      },
      pressure_release_calcium_carbonate_hydrochloric_acid: {
        label: "Calcium Carbonate Hydrochloric Acid Pressure",
        reactants: ["calcium_carbonate"],
        calculatePressure: (params) => 24.47 * params.calcium_carbonate / params.volume
      },
      pressure_release_zinc_hydrochloric_acid: {
        label: "Zinc Hydrochloric Acid Pressure",
        reactants: ["zinc"],
        calculatePressure: (params) => 24.47 * params.zinc / params.volume
      },
      pressure_release_dry_ice: {
        label: "Dry Ice Pressure",
        reactants: ["carbon_dioxide"],
        calculatePressure: (params) => 24.47 * params.carbon_dioxide / params.volume
      }
    };

    const values = {};
    const controls = {};
    let selectedMode = "battery";
    let selectedReaction = "time_stop_thiosulfate";
    let selectedPressureReaction = "pressure_release_dry_ice";

    function formatValue(value, unit = "") {
      const abs = Math.abs(value);
      let shown;

      if (abs !== 0 && abs < 0.01) {
        shown = value.toFixed(4);
      } else if (abs < 10) {
        shown = value.toFixed(3).replace(/0+$/, "").replace(/\.$/, "");
      } else {
        shown = value.toFixed(2).replace(/0+$/, "").replace(/\.$/, "");
      }

      return unit ? `${shown} ${unit}` : shown;
    }

    function renderControl(name, mount) {
      const def = parameterDefs[name];
      if (!(name in values)) {
        values[name] = def.value;
      }

      mount.innerHTML = `
        <div class="control-top">
          <label for="${name}">${def.label}</label>
          <output id="${name}-value" for="${name}">${formatValue(values[name], def.unit)}</output>
        </div>
        <input
          type="range"
          id="${name}"
          min="${def.min}"
          max="${def.max}"
          step="${def.step}"
          value="${values[name]}"
        >
        <div class="bounds">
          <span>${formatValue(def.min, def.unit)}</span>
          <span>${formatValue(def.max, def.unit)}</span>
        </div>
      `;

      const input = mount.querySelector("input");
      const output = mount.querySelector("output");
      controls[name] = { input, output };

      input.addEventListener("input", () => {
        values[name] = Number(input.value);
        output.textContent = formatValue(values[name], def.unit);
        updateResults();
      });
    }

    function populateReactionSelect() {
      const select = document.getElementById("reaction-select");
      select.innerHTML = Object.entries(chemicalReactions)
        .map(([name, reaction]) => `<option value="${name}">${reaction.label}</option>`)
        .join("");
      select.value = selectedReaction;
      select.addEventListener("change", () => {
        selectedReaction = select.value;
        renderChemicalControls();
        updateResults();
      });
    }

    function renderChemicalControls() {
      const container = document.getElementById("chemical-controls");
      controls.thiosulfate = undefined;
      controls.hydrogen_peroxide = undefined;
      controls.pressure_hydrogen_peroxide = undefined;
      controls.iodine = undefined;
      controls.peroxodisulfate = undefined;
      controls.ascorbicacid = undefined;
      controls.bisulfate = undefined;
      controls.iodate = undefined;
      container.innerHTML = "";

      chemicalReactions[selectedReaction].reactants.forEach((name) => {
        const mount = document.createElement("div");
        mount.className = "control";
        mount.dataset.control = name;
        container.appendChild(mount);
        renderControl(name, mount);
      });
    }

    function populatePressureReactionSelect() {
      const select = document.getElementById("pressure-reaction-select");
      select.innerHTML = Object.entries(pressureReactions)
        .map(([name, reaction]) => `<option value="${name}">${reaction.label}</option>`)
        .join("");
      select.value = selectedPressureReaction;
      select.addEventListener("change", () => {
        selectedPressureReaction = select.value;
        renderPressureControls();
        updateResults();
      });
    }

    function renderPressureControls() {
      const container = document.getElementById("pressure-controls");
      controls.volume = undefined;
      controls.sodium_bicarbonate = undefined;
      controls.calcium_carbonate = undefined;
      controls.zinc = undefined;
      controls.carbon_dioxide = undefined;
      container.innerHTML = "";

      [
        ...pressureReactions[selectedPressureReaction].reactants,
        "volume"
      ].forEach((name) => {
        const mount = document.createElement("div");
        mount.className = "control";
        mount.dataset.control = name;
        container.appendChild(mount);
        renderControl(name, mount);
      });
    }

    function timeStop(params) {
      return chemicalReactions[selectedReaction].calculate(params);
    }

    function stallTorqueCalc(v, r, tc) {
      return tc * (v / r);
    }

    function pressureCalc(params) {
      return pressureReactions[selectedPressureReaction].calculatePressure(params);
    }

    function wNoLoadCalcPressure(defaultWNoLoad, pressure, defaultPressure) {
      return defaultWNoLoad * pressure / defaultPressure;
    }

    function stallTorqueCalcPressure(defaultStallTorque, pressure, defaultPressure) {
      return defaultStallTorque * pressure / defaultPressure;
    }

    function calculateDistance(params) {
      const isPressureMode = selectedMode === "pressure";
      const stopTime = isPressureMode ? params.reaction_time : timeStop(params);
      const pressure = isPressureMode ? pressureCalc(params) : null;
      const stallTorque = isPressureMode
        ? stallTorqueCalcPressure(params.pressure_stall_torque_default, pressure, params.default_pressure)
        : stallTorqueCalc(params.voltage, params.resistance, params.torque_constant);
      const wMax = isPressureMode
        ? wNoLoadCalcPressure(params.pressure_w_no_load_default, pressure, params.default_pressure)
        : params.w_max;
      const effectiveStallTorque = stallTorque
        * modelConstants.motorEfficiency
        / params.number_wheels;
      const mechanics = [
        params.mass,
        params.radius,
        params.bearing_friction,
        params.rolling_friction,
        modelConstants.k,
        wMax,
        params.g
      ];

      let time = 0;
      let angularVelocity = 0;
      let position = 0;
      const dt = 30 / 10000;
      const motionPoints = [{ time: 0, position: 0, linearVelocity: 0 }];

      for (let n = 0; n < 10000; n += 1) {
        const friction = (mechanics[0] / params.number_wheels) * mechanics[1] * mechanics[6];
        const momentOfInertia = params.wheel_mass * Math.pow(params.radius, 2);
        let netTorque;

        if (time < stopTime) {
          netTorque = effectiveStallTorque
            - mechanics[2] * mechanics[4] * friction
            - mechanics[3] * friction
            - (effectiveStallTorque * angularVelocity) / mechanics[5];
        } else if (time >= stopTime && angularVelocity > 0) {
          netTorque = -mechanics[2] * mechanics[4] * friction
            - mechanics[3] * friction;
        } else {
          netTorque = 0;
        }

        time += 0.01;
        const angularAcceleration = netTorque / momentOfInertia;
        angularVelocity = Math.max(0, angularVelocity + angularAcceleration * dt);
        const linearVelocity = angularVelocity * params.radius;
        position += linearVelocity * dt;

        if (n % 50 === 0 || n === 9999) {
          motionPoints.push({
            time: (n + 1) * dt,
            position,
            linearVelocity
          });
        }
      }

      return {
        position,
        stopTime,
        stallTorque: effectiveStallTorque,
        angularVelocity,
        motionPoints,
        pressure,
        wMax
      };
    }

    function drawMotionChart(result) {
      const canvas = document.getElementById("motion-chart");
      const ctx = canvas.getContext("2d");
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const width = Math.max(1, rect.width);
      const height = Math.max(1, rect.height);
      const scaledWidth = Math.round(width * dpr);
      const scaledHeight = Math.round(height * dpr);

      if (canvas.width !== scaledWidth || canvas.height !== scaledHeight) {
        canvas.width = scaledWidth;
        canvas.height = scaledHeight;
      }

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, width, height);

      const padding = {
        top: 16,
        right: 12,
        bottom: 30,
        left: 38
      };
      const plotWidth = width - padding.left - padding.right;
      const plotHeight = height - padding.top - padding.bottom;
      const points = result.motionPoints;
      const maxTime = 30;
      const maxPosition = Math.max(0.001, ...points.map((point) => point.position));
      const maxVelocity = Math.max(0.001, ...points.map((point) => point.linearVelocity));

      function xFor(timeValue) {
        return padding.left + (timeValue / maxTime) * plotWidth;
      }

      function yFor(value, maxValue) {
        return padding.top + plotHeight - (value / maxValue) * plotHeight;
      }

      ctx.strokeStyle = "#d9ded8";
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i = 0; i <= 4; i += 1) {
        const y = padding.top + (plotHeight / 4) * i;
        ctx.moveTo(padding.left, y);
        ctx.lineTo(width - padding.right, y);
      }
      for (let i = 0; i <= 3; i += 1) {
        const x = padding.left + (plotWidth / 3) * i;
        ctx.moveTo(x, padding.top);
        ctx.lineTo(x, height - padding.bottom);
      }
      ctx.stroke();

      ctx.strokeStyle = "#64706b";
      ctx.beginPath();
      ctx.moveTo(padding.left, padding.top);
      ctx.lineTo(padding.left, height - padding.bottom);
      ctx.lineTo(width - padding.right, height - padding.bottom);
      ctx.stroke();

      function drawLine(color, key, maxValue) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        points.forEach((point, index) => {
          const x = xFor(point.time);
          const y = yFor(point[key], maxValue);
          if (index === 0) {
            ctx.moveTo(x, y);
          } else {
            ctx.lineTo(x, y);
          }
        });
        ctx.stroke();
      }

      drawLine("#18756d", "position", maxPosition);
      drawLine("#c95d2e", "linearVelocity", maxVelocity);

      ctx.fillStyle = "#64706b";
      ctx.font = "11px Arial, Helvetica, sans-serif";
      ctx.textAlign = "left";
      ctx.fillText("0 s", padding.left, height - 10);
      ctx.textAlign = "right";
      ctx.fillText("30 s", width - padding.right, height - 10);
      ctx.textAlign = "left";
      ctx.fillText(`${maxPosition.toFixed(2)} m`, padding.left, 12);
      ctx.textAlign = "right";
      ctx.fillText(`${maxVelocity.toFixed(2)} m/s`, width - padding.right, 12);
    }

    function updateResults() {
      const result = calculateDistance(values);
      document.getElementById("distance").textContent = result.position.toFixed(3);
      document.getElementById("clock-time").textContent = `${result.stopTime.toFixed(3)} s`;
      drawMotionChart(result);
    }

    document.querySelectorAll("[data-control]").forEach((mount) => {
      renderControl(mount.dataset.control, mount);
    });

    populateReactionSelect();
    renderChemicalControls();
    populatePressureReactionSelect();
    renderPressureControls();

    function setActiveTab(tabName) {
      document.querySelectorAll("[data-tab]").forEach((button) => {
        button.classList.toggle("active", button.dataset.tab === tabName);
      });
      document.querySelectorAll(".tab-panel").forEach((panel) => {
        panel.classList.toggle("active", panel.id === tabName);
      });
    }

    function updateModeUi() {
      document.querySelectorAll("[data-mode]").forEach((button) => {
        button.classList.toggle("active", button.dataset.mode === selectedMode);
      });

      document.getElementById("parameter-tabs").style.gridTemplateColumns = selectedMode === "pressure"
        ? "repeat(2, minmax(0, 1fr))"
        : "repeat(3, minmax(0, 1fr))";

      document.querySelectorAll("[data-modes]").forEach((element) => {
        const modes = element.dataset.modes.split(" ");
        element.hidden = !modes.includes(selectedMode);
      });

      const activePanel = document.querySelector(".tab-panel.active");
      if (!activePanel || activePanel.id === "motor" && selectedMode === "pressure" || activePanel.id === "chemical" && selectedMode === "pressure" || activePanel.id === "pressure" && selectedMode === "battery") {
        setActiveTab(selectedMode === "pressure" ? "pressure" : "motor");
      }

      updateResults();
    }

    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        if (tab.dataset.mode) {
          selectedMode = tab.dataset.mode;
          updateModeUi();
          return;
        }

        if (tab.hidden) {
          return;
        }

        document.querySelectorAll(".tab").forEach((button) => {
          if (button.dataset.tab) {
            button.classList.toggle("active", button === tab);
          }
        });
        document.querySelectorAll(".tab-panel").forEach((panel) => {
          panel.classList.toggle("active", panel.id === tab.dataset.tab);
        });
      });
    });

    document.getElementById("reset").addEventListener("click", () => {
      Object.entries(parameterDefs).forEach(([name, def]) => {
        values[name] = def.value;
        if (controls[name]) {
          controls[name].input.value = def.value;
          controls[name].output.textContent = formatValue(def.value, def.unit);
        }
      });
      selectedReaction = "time_stop_thiosulfate";
      selectedPressureReaction = "pressure_release_dry_ice";
      selectedMode = "battery";
      document.getElementById("reaction-select").value = selectedReaction;
      document.getElementById("pressure-reaction-select").value = selectedPressureReaction;
      renderChemicalControls();
      renderPressureControls();
      setActiveTab("motor");
      updateModeUi();
      updateResults();
    });

    window.addEventListener("resize", updateResults);

    updateModeUi();
  </script>
</body>
</html>
